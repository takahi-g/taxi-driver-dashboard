<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Taxi Driver Dashboard</title>
  <meta name="description" content="タクシードライバー向けの勤務日数、時間、売上、チップ管理ダッシュボード">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Taxi Dashboard">
  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=Noto+Sans+JP:wght@300;400;500;700&display=swap" rel="stylesheet">
  <!-- Lucide Icons -->
  <script src="https://cdn.jsdelivr.net/npm/lucide@0.321.0/dist/umd/lucide.min.js"></script>
  <link rel="stylesheet" href="style-v202607131735.css">
</head>
<body>
  <div class="app-container">
    <!-- トップバー (バージョン & 更新ボタン) -->
    <div class="top-bar">
      <span class="version-badge">v2026.07.13.1735</span>
      <button id="refresh-btn" class="btn-icon" title="ページを更新"><i data-lucide="refresh-cw"></i></button>
    </div>

    <!-- サイドバー / ヘッダー -->
    <header class="main-header">
      <div class="logo-area">
        <div>
          <h1>Taxi Dashboard</h1>
          <p class="subtitle">Driver Performance & Earnings Tracker</p>
        </div>
      </div>
      <div class="header-actions">
        <button id="add-record-btn" class="btn btn-primary">
          <i data-lucide="plus"></i> 勤務を記録する
        </button>
      </div>
    </header>

    <!-- メインコンテンツ -->
    <main class="main-content">
      
      <!-- ペイン1: カレンダー (出勤リスト表示) -->
      <div id="pane-calendar" class="tab-pane">
        <section class="work-list-section card">
          <div class="card-header">
            <h2><i data-lucide="check-square"></i> 出勤記録リスト</h2>
            <span class="badge" id="work-days-count">0 日出勤</span>
          </div>
          <div class="calendar-grid-wrapper">
            <div id="work-list-container" class="work-list-container">
              <!-- JSで動的に追加されます -->
            </div>
          </div>
        </section>
      </div>

      <!-- ペイン2: ダッシュボード (集計数値 & グラフ) -->
      <div id="pane-dashboard" class="tab-pane pane-hidden">
        <!-- サマリーカードセクション -->
        <section class="summary-section">
          <div class="summary-card" id="card-days">
            <div class="card-icon"><i data-lucide="calendar"></i></div>
            <div class="card-data">
              <span class="card-label">出勤日数</span>
              <span class="card-value" id="val-days">0 <span class="unit">日</span></span>
            </div>
          </div>
          <div class="summary-card" id="card-hours">
            <div class="card-icon"><i data-lucide="clock"></i></div>
            <div class="card-data">
              <span class="card-label">総勤務時間</span>
              <span class="card-value" id="val-hours">0 <span class="unit">時間</span></span>
            </div>
          </div>
          <div class="summary-card text-success" id="card-earnings">
            <div class="card-icon"><i data-lucide="japanese-yen"></i></div>
            <div class="card-data">
              <span class="card-label">総売上金額</span>
              <span class="card-value" id="val-earnings">¥0</span>
            </div>
          </div>
          <div class="summary-card text-accent" id="card-tips">
            <div class="card-icon"><i data-lucide="sparkles"></i></div>
            <div class="card-data">
              <span class="card-label">総チップ額</span>
              <span class="card-value" id="val-tips">¥0</span>
            </div>
          </div>
          <div class="summary-card text-info" id="card-hourly">
            <div class="card-icon"><i data-lucide="trending-up"></i></div>
            <div class="card-data">
              <span class="card-label">平均時間売上</span>
              <span class="card-value" id="val-hourly">¥0<span class="unit">/h</span></span>
            </div>
          </div>
        </section>

        <!-- 勤務履歴（月別アコーディオン） -->
        <section class="history-section card">
          <div class="card-header">
            <h2><i data-lucide="history"></i> 勤務履歴</h2>
            <span class="badge" id="record-count">0 件の記録</span>
          </div>
          <div id="history-accordion" class="history-accordion">
            <!-- JSで動的に追加されます -->
          </div>
        </section>
      </div>

      <!-- ペイン3: 設定 (入力カレンダー & 各種設定) -->
      <div id="pane-settings" class="tab-pane pane-hidden">
        <!-- 入力用カレンダーセクション -->
        <section class="calendar-section card" id="calendar-section">
          <div class="card-header calendar-header-layout">
            <h2><i data-lucide="calendar-days"></i> 出勤日登録カレンダー</h2>
            <div class="calendar-controls" id="calendar-controls">
              <button id="prev-month-btn" class="btn-icon" title="前月"><i data-lucide="chevron-left"></i></button>
              <span id="current-month-label" class="calendar-month-label">2026年 7月</span>
              <button id="next-month-btn" class="btn-icon" title="次月"><i data-lucide="chevron-right"></i></button>
            </div>
          </div>
          <div class="calendar-grid-wrapper">
            <div class="calendar-weekdays">
              <div class="weekday text-danger">日</div>
              <div class="weekday">月</div>
              <div class="weekday">火</div>
              <div class="weekday">水</div>
              <div class="weekday">木</div>
              <div class="weekday">金</div>
              <div class="weekday text-info">土</div>
            </div>
            <div id="calendar-days-grid" class="calendar-days-grid">
              <!-- JSで動的に追加されます -->
            </div>
          </div>
        </section>

        <!-- アプリ設定 -->
        <section class="settings-section card mt-4">
          <div class="card-header">
            <h2><i data-lucide="sliders-horizontal"></i> アプリ設定</h2>
          </div>
          <div class="settings-list">
            <div class="settings-item">
              <div class="settings-info">
                <span class="settings-title">出勤日のみリスト表示する</span>
                <span class="settings-desc">「カレンダー」タブの出勤リストで、登録がある日だけをすっきりと表示します。</span>
              </div>
              <label class="switch">
                <input type="checkbox" id="setting-work-only">
                <span class="slider round"></span>
              </label>
            </div>
          </div>
        </section>
      </div>

    </main>

    <!-- 勤務記録追加モーダル -->
    <div id="record-modal" class="modal">
      <div class="modal-content card">
        <div class="modal-header">
          <h2><i data-lucide="edit-3"></i> 勤務記録の追加</h2>
          <button id="close-modal-btn" class="close-btn"><i data-lucide="x"></i></button>
        </div>
        <form id="record-form">
          <div class="form-group">
            <label for="input-date">日付</label>
            <input type="date" id="input-date" required>
          </div>
          <div class="form-row">
            <div class="form-group">
              <label for="input-start-time">勤務開始時間</label>
              <input type="time" id="input-start-time" required>
            </div>
            <div class="form-group">
              <label for="input-end-time">勤務終了時間</label>
              <input type="time" id="input-end-time" required>
            </div>
          </div>
          <div class="form-row">
            <div class="form-group">
              <label for="input-earnings">売上金額 (円)</label>
              <input type="number" id="input-earnings" min="0" placeholder="例: 35000" required>
            </div>
            <div class="form-group">
              <label for="input-tips">チップ額 (円)</label>
              <input type="number" id="input-tips" min="0" placeholder="例: 1500" required>
            </div>
          </div>
          <div class="form-actions">
            <button type="button" id="cancel-btn" class="btn btn-secondary">キャンセル</button>
            <button type="submit" class="btn btn-primary">保存する</button>
          </div>
        </form>
      </div>
    </div>

    <!-- 浮かせるカプセル型下部ナビゲーションバー -->
    <nav class="tab-bar" id="tab-bar">
      <button class="tab-item active" data-pane="pane-calendar">
        <i data-lucide="calendar"></i>
        <span>カレンダー</span>
      </button>
      <button class="tab-item" data-pane="pane-dashboard">
        <i data-lucide="layout-dashboard"></i>
        <span>集計</span>
      </button>
      <button class="tab-item" data-pane="pane-settings">
        <i data-lucide="settings"></i>
        <span>設定</span>
      </button>
    </nav>
  </div>

  <script src="app-v202607131735.js"></script>
</body>
</html>
